<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6" crossorigin="anonymous">

    <title>Automated Vaccine Notifier</title>
</head>

<body>



    <div class="container my-4">
        <h1>Welcome to Automated vaccine alerts !</h1>


        <div class="mb-3">
            <label for="number" class="form-label">Phone number</label>
            <input type="text" class="form-control" id="number" placeholder="Enter your phone number">
            <div id=" invalidNumber" class="invalid-feedback">Please Enter a valid phone number(Enter a 10 digit number)
            </div>

        </div>
        <div class="mb-3">
            <label for="selectState" class="form-label">Select your State</label>
            <select id="selectState" class="form-select" aria-label="Default select example">
                <option selected value disabled>Choose from the drop down</option>

                <option value="1">Andaman and Nicobar Islands</option>
                <option value="2">Andhra Pradesh</option>
                <option value="3">Arunachal Pradesh</option>
                <option value="4">Assam</option>
                <option value="5">Bihar</option>
                <option value="6">Chandigarh</option>
                <option value="7">Chhattisgarh</option>
                <option value="8">Dadra and Nagar Haveli</option>
                <option value="9">Delhi</option>
                <option value="10">Goa</option>
                <option value="11">Gujarat</option>
                <option value="12">Haryana</option>
                <option value="13">Himachal Pradesh</option>
                <option value="14">Jammu and Kashmir</option>
                <option value="15">Jharkhand</option>
                <option value="16">Karnataka</option>
                <option value="17">Kerala</option>
                <option value="18">Ladakh</option>
                <option value="19">Lakshadweep</option>
                <option value="20">Madhya Pradesh</option>
                <option value="21">Maharashtra</option>
                <option value="22">Manipur</option>
                <option value="23">Meghalaya</option>
                <option value="24">Mizoram</option>
                <option value="25">Nagaland</option>
                <option value="26">Odisha</option>
                <option value="27">Puducherry</option>
                <option value="28">Punjab</option>
                <option value="29">Rajasthan</option>
                <option value="30">Sikkim</option>
                <option value="31">Tamil Nadu</option>
                <option value="32">Telangana</option>
                <option value="33">Tripura</option>
                <option value="34">Uttar Pradesh</option>
                <option value="35">Uttarakhand</option>
                <option value="36">West Bengal</option>
                <option value="37">Daman and Diu</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="selectDistrict" class="form-label">Select your District</label>
            <select id="selectDistrict" class="form-select" aria-label="Default select example">
                <option selected value disabled>Choose from the drop down</option>


            </select>
        </div>
        <div class="text-center ">

            <button id="submit" class="btn btn-primary">submit</button>
        </div>

        <div id="dataTable my-4">

            <table class="table ">
                <thead>

                    <tr>

                        <th>Total_Doses</th>
                        <th>Dose1</th>
                        <th>Dose2</th>
                        <th>Date</th>
                        <th>Vaccine</th>
                        <th>Min_age</th>
                        <th>Address</th>
                        <th>Center_name</th>
                        <th>Block</th>
                        <th>District</th>
                        <th>Fee_type</th>
                        <th>State</th>

                    </tr>



                    <tbody>
                                              
                        
                      </tbody>

            </table>
        </div>



    </div>


    <script src="/vaccine.js"></script>

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-JEW9xMcG8R+pH31jmWH6WWP0WintQrMb4s7ZOdauHnUtxwoG2vI5DkLtS3qm9Ekf"
        crossorigin="anonymous"></script>


</body>

</html>
